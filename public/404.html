<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found - Ecommerce</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #F6F8FA;
        color: rgb(24 24 29);
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 4rem;
        margin: 0;
        background: linear-gradient(0deg, rgb(132 144 255) 0%, rgb(98 189 252) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        font-size: 1.2rem;
        margin: 1rem 0 2rem;
        color: rgba(29, 29, 29, 0.8);
      }
      a {
        color: rgb(98 84 243);
        text-decoration: none;
        font-weight: 600;
        padding: 0.8rem 2rem;
        border: 2px solid rgb(98 84 243);
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      a:hover {
        background: rgb(98 84 243);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Sorry, the page you're looking for doesn't exist.</p>
      <a href="/">Go back home</a>
    </div>
  </body>
</html>
